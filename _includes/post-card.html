{% assign post = include.post %}
<article class="post">
  <div class="meta-row">
    <span class="post-date">{{ post.date | date: "%Y.%m.%d" }}</span>
    <span class="cat-chip">{{ post.category }}</span>
  </div>
  {% if post.title and post.title != "" %}
    <h2 class="post-title"><a href="{{ post.url | relative_url }}"><span class="hl">{{ post.title }}</span></a></h2>
  {% endif %}
  <div class="post-body">
    <div class="clampable" data-clamp="{{ site.clamp_lines }}">
      {{ post.content }}
    </div>
  </div>
  {% if post.tags and post.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in post.tags %}<span class="tag">#{{ tag }}</span>{% endfor %}
    </div>
  {% endif %}
  <div class="post-foot">
    <button class="btn react-btn" data-slug="{{ post.url }}">잘 봤어요 <span class="count">0</span></button>
    <a href="{{ post.url | relative_url }}#giscus-container" class="btn comment-btn">댓글</a>
  </div>
</article>
